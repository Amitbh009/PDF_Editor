name: Build PDFForge

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:

  # ─── Android APK ──────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'   # pinned stable version
          channel: stable
          cache: true                  # cache Flutter between runs

      - name: Disable Flutter analytics
        run: flutter config --no-analytics
        working-directory: flutter_app

      - name: Install dependencies
        run: flutter pub get
        working-directory: flutter_app

      - name: Run flutter doctor (debug info)
        run: flutter doctor -v
        working-directory: flutter_app

      - name: Build APK (release)
        run: flutter build apk --release --no-tree-shake-icons
        working-directory: flutter_app

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFForge-Android-APK
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ─── Android App Bundle (Play Store) ──────────────────────────────────────
  build-aab:
    name: Build Android App Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable
          cache: true

      - name: Disable analytics
        run: flutter config --no-analytics
        working-directory: flutter_app

      - name: Install dependencies
        run: flutter pub get
        working-directory: flutter_app

      - name: Build App Bundle
        run: flutter build appbundle --release --no-tree-shake-icons
        working-directory: flutter_app

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFForge-Android-AAB
          path: flutter_app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # ─── Windows Desktop ───────────────────────────────────────────────────────
  build-windows:
    name: Build Windows Desktop
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable
          cache: true

      - name: Disable analytics
        run: flutter config --no-analytics
        working-directory: flutter_app

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
        working-directory: flutter_app

      - name: Install dependencies
        run: flutter pub get
        working-directory: flutter_app

      - name: Build Windows release
        run: flutter build windows --release --no-tree-shake-icons
        working-directory: flutter_app

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFForge-Windows-EXE
          path: flutter_app/build/windows/x64/runner/Release/
          retention-days: 30

  # ─── Web Build ─────────────────────────────────────────────────────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable
          cache: true

      - name: Disable analytics
        run: flutter config --no-analytics
        working-directory: flutter_app

      - name: Install dependencies
        run: flutter pub get
        working-directory: flutter_app

      - name: Build Web
        run: flutter build web --release
        working-directory: flutter_app

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFForge-Web
          path: flutter_app/build/web/
          retention-days: 30