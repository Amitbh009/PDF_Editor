name: pdfforge
description: PDFForge - Cross-platform PDF Editor for Desktop and Mobile

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP Client — used in api_service.dart
  dio: ^5.4.3

  # File picking — used in home_screen.dart
  file_picker: ^8.0.3

  # UI fonts — used in app_theme.dart
  google_fonts: ^6.2.1

  # State management — used in providers/app_providers.dart
  flutter_riverpod: ^2.5.1

  # Local storage — used in main.dart
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true