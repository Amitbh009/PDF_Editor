name: pdfforge
description: PDFForge - Cross-platform PDF Editor for Desktop and Mobile

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP Client
  dio: ^5.4.3
  http: ^1.2.1

  # File Handling
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  open_file: ^3.3.2
  share_plus: ^9.0.0

  # UI & Design
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  animations: ^2.0.11
  shimmer: ^3.0.0
  flutter_colorpicker: ^1.1.0

  # State Management — pinned compatible set (no analyzer conflict)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # Storage — manual hive, no code generator needed
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  url_launcher: ^6.3.0

  # Permissions — 11.1.x is stable and compatible
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Dropped hive_generator — it conflicts with riverpod_generator's analyzer
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true