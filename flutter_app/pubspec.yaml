name: pdfforge
description: PDFForge - Cross-platform PDF Editor for Desktop and Mobile

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # PDF Rendering
  syncfusion_flutter_pdfviewer: ^25.1.38
  syncfusion_flutter_pdf: ^25.1.38

  # HTTP Client
  dio: ^5.4.3
  http: ^1.2.1

  # File Handling
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  open_file: ^3.3.2
  share_plus: ^9.0.0

  # UI & Design
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  animations: ^2.0.11
  lottie: ^3.1.0
  shimmer: ^3.0.0
  flutter_colorpicker: ^1.1.0
  fluentui_system_icons: ^1.1.230

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.10
  riverpod_generator: ^2.4.3
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi-Regular.ttf
        - asset: assets/fonts/Satoshi-Medium.ttf
          weight: 500
        - asset: assets/fonts/Satoshi-Bold.ttf
          weight: 700
